<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Visual Quality Inspection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:500px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

h1{
margin-bottom:25px;
font-size:28px;
}

.upload-box{
border:2px dashed #94a3b8;
padding:30px;
border-radius:10px;
background:#020617;
margin-bottom:20px;
}

button{
margin-top:15px;
padding:12px 35px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
}

img{
margin-top:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.result{
margin-top:20px;
padding:15px;
border-radius:8px;
font-size:20px;
font-weight:bold;
}

.ok{
background:#16a34a;
}

.defect{
background:#dc2626;
}

</style>

</head>

<body>

<div class="container">

<h1>🔍 AI Casting Inspection</h1>

<form method="POST" enctype="multipart/form-data">

<div class="upload-box">
<input type="file" name="file" required>
</div>

<button type="submit">Run Inspection</button>

</form>

{% if image_path %}

<h3 style="margin-top:20px;">Uploaded Image</h3>

<img src="{{ image_path }}" width="250">

{% if result == "OK" %}

<div class="result ok">
✅ Casting Quality: GOOD
</div>

{% else %}

<div class="result defect">
❌ Casting Quality: DEFECT DETECTED
</div>

{% endif %}

{% endif %}

</div>

</body>

</html>
